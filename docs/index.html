<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Refuel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f14">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Refuel">
<style>
:root{--bg:#0d0f14;--panel:#141821;--card:#11151d;--bd:#252c3a;--track:#0a0c11;
--tx:#e7eaf0;--mut:#8a93a4;--acc:#46e08a;--warn:#f5c451;--dng:#f3766b;--blu:#5a8dee}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--tx);font-family:'Malgun Gothic',system-ui,sans-serif;
padding:max(16px,env(safe-area-inset-top)) 16px 32px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.brand{font-weight:700;font-size:17px;color:var(--acc)}
.meta{font-size:11px;color:var(--mut)}
.card{background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.aname{font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.count{font-size:40px;font-weight:700;font-family:Consolas,monospace;letter-spacing:1px;margin:6px 0 2px}
.sub{font-size:11px;color:var(--mut);line-height:1.6}
.bar{height:7px;background:var(--track);border-radius:5px;overflow:hidden;margin:10px 0 4px}
.fill{height:100%;width:0%;background:var(--acc);transition:width .4s}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.mini{background:var(--card);border-radius:10px;padding:8px 12px}
.mini .l{font-size:10px;color:var(--mut)}
.mini .v{font-size:15px;font-weight:700;font-family:Consolas,monospace}
.days{margin-top:10px}
.drow{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:10px}
.drow .dl{width:52px;color:var(--mut)}
.drow .dt{flex:1;height:6px;background:var(--track);border-radius:4px;overflow:hidden}
.drow .df{height:100%;background:var(--blu)}
.drow .dv{width:44px;text-align:right;color:var(--mut);font-family:Consolas,monospace}
.setup{background:var(--panel);border:1px dashed var(--bd);border-radius:14px;padding:16px;font-size:13px;line-height:1.9}
.setup code{background:var(--card);padding:2px 6px;border-radius:6px;font-size:11px;word-break:break-all}
button{background:var(--card);color:var(--tx);border:1px solid var(--bd);border-radius:8px;
padding:8px 14px;font-size:12px;margin-top:8px}
a{color:var(--blu)}
.stale{color:var(--warn)}
</style></head><body>
<div class="top"><div class="brand">● Refuel</div><div style="display:flex;align-items:center;gap:10px"><div class="meta" id="meta">--</div><button id="gear" title="설정" style="background:none;border:0;color:var(--mut);font-size:20px;cursor:pointer;padding:2px 4px;line-height:1">⚙</button></div></div>
<div id="root"></div>
<script src="jsqr.min.js"></script>
<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const num=v=>{const n=Number(v);return Number.isFinite(n)?n:0};
const P=new URLSearchParams(location.hash.slice(1));
if(P.get('t')){localStorage.rf_t=P.get('t');if(P.get('k'))localStorage.rf_k=P.get('k');
 if(P.get('sv'))localStorage.rf_sv=P.get('sv');history.replaceState(null,'',location.pathname);}
const T=localStorage.rf_t, K=localStorage.rf_k, SV=localStorage.rf_sv||'https://ntfy.sh';
const DEMO = P.get('demo')!==null;   // 명시적 #demo 일 때만 샘플. 미연결은 연결 화면.
const PAIRED = !!(T && K);
let state=null, lastFetch=0, cryptoKey=null;
function demoState(){
 const now=Date.now()/1000, day=86400, base=new Date();
 const sampleM=[69,31,22,88,14,52,20], daily=[];
 for(let i=6;i>=0;i--){const d=new Date(base);d.setDate(d.getDate()-i);
  daily.push([d.toISOString().slice(0,10), sampleM[6-i]*1e6]);}
 return {ts:now, total_events:1287, agents:[{
  id:'claude-code', name:'Claude Code', today:20450000, week:174000000,
  block:{reset:now+2*3600+15*60+30, tok:3585015, ratio:0.45, eta:null},
  wk:{reset:now+3*day+4*3600, ratio:0.62}, daily}]};
}

// ---- 진단 로그 (유지보수용) ----
// 보안: 토픽·암호화 키는 절대 기록하지 않는다(로그 공유 = 계정 탈취가 되면 안 됨).
const LOG_MAX=300, LOG_KEY='rf_log';
const pollState={ok:null,badLogged:false};   // 로그 스팸 방지(상태 전환 시에만 기록)
let LOG=[];
try{LOG=JSON.parse(localStorage.getItem(LOG_KEY)||'[]')}catch(e){LOG=[]}
function rlog(level,msg){
 LOG.push({t:new Date().toISOString(),l:level,m:String(msg).slice(0,400)});
 if(LOG.length>LOG_MAX)LOG=LOG.slice(-LOG_MAX);
 try{localStorage.setItem(LOG_KEY,JSON.stringify(LOG))}catch(_){}
 (level==='error'?console.error:console.log)('[refuel]',msg);
 const b=$('#logbox');if(b)b.textContent=logTail();
}
function logTail(n=40){
 return LOG.slice(-n).map(e=>`[${e.t.slice(11,19)}] ${e.l[0].toUpperCase()} ${e.m}`).join('\n')||'(기록 없음)';
}
function logReport(){
 const Cap=window.Capacitor, native=!!(Cap&&Cap.isNativePlatform&&Cap.isNativePlatform());
 return ['Refuel 진단 로그',
  '생성: '+new Date().toLocaleString('ko-KR'),
  '실행: '+(native?'네이티브 앱':'웹')+' / 모드: '+(DEMO?'데모':'연동'),
  '페어링: '+(T?'있음':'없음')+' · 키: '+(K?'있음':'없음')+' · 릴레이: '+SV,
  'UA: '+navigator.userAgent,
  '항목 수: '+LOG.length,
  '─────────────────────────',
  LOG.map(e=>`[${e.t.slice(0,19).replace('T',' ')}] ${e.l.toUpperCase()} ${e.m}`).join('\n')
 ].join('\n');
}
window.addEventListener('error',e=>rlog('error','uncaught: '+(e.message||'')+' @'+(e.filename||'').split('/').pop()+':'+(e.lineno||'')));
window.addEventListener('unhandledrejection',e=>rlog('error','unhandled: '+((e.reason&&e.reason.message)||e.reason)));
if(P.get('t'))rlog('info','QR 페어링 저장됨');

// ---- 앱 내 QR 스캐너 (ntfy 앱 없이 바로 페어링) ----
function applyPairing(text){
 const i=String(text).indexOf('#');
 const p=new URLSearchParams(i>=0?text.slice(i+1):'');
 if(!p.get('t')){rlog('warn','QR에 페어링 정보 없음');alert('Refuel 페어링 QR이 아닙니다.');return false;}
 localStorage.rf_t=p.get('t');
 if(p.get('k'))localStorage.rf_k=p.get('k');
 if(p.get('sv'))localStorage.rf_sv=p.get('sv');
 rlog('info','페어링 완료 - 재시작');
 location.reload();
 return true;
}
async function startScan(){
 if(typeof jsQR!=='function'){rlog('error','QR 디코더 로드 안 됨');alert('스캐너를 불러오지 못했습니다.');return;}
 rlog('info','QR 스캔 시작');
 let stream;
 try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});}
 catch(e){rlog('error','카메라 접근 실패: '+(e&&e.message||e));alert('카메라를 열 수 없습니다. 앱 설정에서 카메라 권한을 허용해 주세요.');return;}
 const ov=document.createElement('div');
 ov.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px';
 const v=document.createElement('video');v.setAttribute('playsinline','');v.muted=true;
 v.style.cssText='width:88%;max-width:420px;border-radius:16px';v.srcObject=stream;
 const hint=document.createElement('div');hint.textContent='PC 화면의 QR을 비추세요';
 hint.style.cssText='color:#e7eaf0;font-size:15px';
 const cancel=document.createElement('button');cancel.textContent='취소';
 cancel.style.cssText='background:#141821;color:#e7eaf0;border:1px solid #252c3a;border-radius:10px;padding:10px 22px;font-size:14px';
 ov.append(hint,v,cancel);document.body.append(ov);
 const cv=document.createElement('canvas'),cx=cv.getContext('2d',{willReadFrequently:true});
 let stop=false;
 const close=()=>{stop=true;stream.getTracks().forEach(t=>t.stop());ov.remove();};
 cancel.onclick=()=>{rlog('info','QR 스캔 취소');close();};
 try{await v.play();}catch(_){}
 (function tick(){
  if(stop)return;
  if(v.readyState>=2&&v.videoWidth){
   cv.width=v.videoWidth;cv.height=v.videoHeight;
   cx.drawImage(v,0,0,cv.width,cv.height);
   let code=null;try{const im=cx.getImageData(0,0,cv.width,cv.height);code=jsQR(im.data,im.width,im.height);}catch(_){}
   if(code&&code.data){rlog('info','QR 인식됨');close();applyPairing(code.data);return;}
  }
  requestAnimationFrame(tick);
 })();
}
const fmtN=v=>num(v).toLocaleString('en-US');
const fmtS=v=>{v=num(v);return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?Math.round(v/1e3)+'K':''+v};
const WD=['월','화','수','목','금','토','일'];
const WINDOW_SEC=18000, WEEK_SEC=7*86400; // 5시간 윈도우·주간 윈도우(초) — PC측 core.py와 동일
function dur(s){if(s==null)return'--:--:--';s=Math.max(0,Math.floor(s));
 const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60),x=s%60;
 const b=[h,m,x].map(v=>String(v).padStart(2,'0')).join(':');return d?d+'일 '+b:b}
async function getKey(){
 if(cryptoKey||!K)return cryptoKey;
 const raw=new Uint8Array(K.match(/.{2}/g).map(h=>parseInt(h,16)));
 cryptoKey=await crypto.subtle.importKey('raw',raw,'AES-GCM',false,['decrypt']);
 return cryptoKey;
}
async function decrypt(msg){
 if(!msg.startsWith('enc1:'))throw new Error('not encrypted');
 const raw=Uint8Array.from(atob(msg.slice(5)),c=>c.charCodeAt(0));
 const key=await getKey();if(!key)throw new Error('no key');
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(0,12)},key,raw.slice(12));
 return JSON.parse(new TextDecoder().decode(pt));
}
function agentCardsHTML(agents){
 const now=Date.now()/1000;
 if(!agents.length)return `<div class="setup">감지된 에이전트가 없습니다. PC에서 AI 도구를 사용하면 표시됩니다.</div>`;
 return agents.map(a=>{
  const name=esc(a.name||a.id||'?');
  let count='충전완료',col='var(--acc)',prog=0,ratio=null,sub='활성 윈도우 없음 · 바로 사용 가능';
  const bReset=a.block?num(a.block.reset):0, wkReset=(a.wk&&a.wk.reset)?num(a.wk.reset):0;
  const wkRatio=(a.wk&&a.wk.ratio!=null)?num(a.wk.ratio):null;
  if(a.block&&bReset>now){
   const rem=bReset-now;ratio=a.block.ratio==null?null:num(a.block.ratio);
   col=(ratio!=null&&ratio>=0.8)?'var(--dng)':(rem<=1800?'var(--warn)':'var(--acc)');
   count=dur(rem);prog=Math.min(1,(WINDOW_SEC-rem)/WINDOW_SEC);
   const t=new Date(bReset*1000);
   sub=`5시간 리셋 ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')} · 윈도우 ${fmtN(a.block.tok)} 토큰`+(ratio!=null?` · 추정 ${Math.round(ratio*100)}%`:'');
  }else if(wkRatio!=null&&wkRatio>=0.8&&wkReset>now){
   const rem=wkReset-now;col='var(--dng)';count=dur(rem);prog=1-rem/WEEK_SEC;
   sub='주간 한도 도달 - 풀릴 때까지 대기';
  }
  let wkline='';
  if(wkReset){const wd=new Date(wkReset*1000);
   wkline=`주간 ${fmtN(a.week)} 토큰 · 리셋 ${WD[(wd.getDay()+6)%7]} ${String(wd.getHours()).padStart(2,'0')}:${String(wd.getMinutes()).padStart(2,'0')}`+(wkRatio!=null?` · 추정 ${Math.round(wkRatio*100)}%`:'');}
  const daily=(Array.isArray(a.daily)?a.daily:[]).map(d=>[String(d[0]),num(d[1])]);
  const mx=Math.max(...daily.map(d=>d[1]),1);
  const days=daily.slice().reverse().map(d=>{
   const dt=new Date(d[0]+'T00:00:00');
   const lbl=isNaN(dt)?'--':`${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${WD[(dt.getDay()+6)%7]}`;
   return `<div class="drow"><div class="dl">${lbl}</div><div class="dt"><div class="df" style="width:${(d[1]/mx*100).toFixed(0)}%"></div></div><div class="dv">${fmtS(d[1])}</div></div>`}).join('');
  return `<div class="card"><div class="aname"><span>${name}</span></div>
   <div class="count" style="color:${col}" data-reset="${a.block?bReset:''}">${count}</div>
   <div class="sub">${sub}</div><div class="bar"><div class="fill" style="width:${(prog*100).toFixed(1)}%;background:${col}"></div></div>
   <div class="sub">${wkline}</div>
   <div class="grid"><div class="mini"><div class="l">오늘</div><div class="v">${fmtN(a.today)}</div></div>
   <div class="mini"><div class="l">이번 주</div><div class="v">${fmtN(a.week)}</div></div></div>
   <div class="days">${days}</div></div>`}).join('');
}
function connectHTML(){
 return `<div class="setup"><b>PC와 연결하세요</b><br>
   토큰 사용량을 보려면 PC의 Refuel과 한 번만 연결하면 됩니다.<br><br>
   1) PC에 <a href="https://github.com/nohseongmin/Refuel/releases/latest" target="_blank" rel="noopener noreferrer">Refuel 데스크톱</a> 설치·실행<br>
   2) PC 우측 상단 ⚙ → <b>QR 페어링</b><br>
   3) 아래 버튼으로 그 QR을 스캔<br>
   <button id="scanbtn" style="background:var(--acc);color:#0d0f14;border:0;font-weight:700;padding:14px;font-size:15px;width:100%;margin-top:8px">📷 QR 스캔해서 연결</button>
   <button id="demobtn" style="width:100%">앱 미리보기 (데모)</button>
   <span style="color:var(--mut);font-size:11px;display:block;margin-top:8px">사용 시 <a href="https://github.com/nohseongmin/Refuel/blob/main/DISCLAIMER.md" target="_blank" rel="noopener noreferrer">면책조항</a>에 동의한 것으로 간주됩니다.</span></div>`;
}
function wireCommon(){
 const sc=$('#scanbtn');if(sc)sc.onclick=startScan;
 const db=$('#demobtn');if(db)db.onclick=()=>{location.hash='demo';location.reload();};
}
function render(){
 const r=$('#root');
 if(DEMO){
  r.innerHTML=agentCardsHTML(Array.isArray(state&&state.agents)?state.agents:[])
   +`<div class="setup"><b>🎬 데모 · 샘플 데이터</b><br>실제 데이터를 보려면 PC와 연결하세요.
     <button id="scanbtn" style="width:100%;margin-top:6px">📷 QR 스캔해서 연결</button></div>`;
  wireCommon();return;
 }
 if(!PAIRED){$('#meta').textContent='미연결';r.innerHTML=connectHTML();wireCommon();return;}
 if(!state){r.innerHTML=`<div class="setup"><b>데이터 기다리는 중…</b><br>PC의 Refuel이 켜져 있고 ⚙에서 <b>폰 연동</b>이 켜져 있는지 확인하세요.</div>`;return;}
 r.innerHTML=agentCardsHTML(Array.isArray(state.agents)?state.agents:[]);
}

// ---- 로컬 알림 (폰이 직접 예약 → PC 꺼져도 리셋 시각에 울림, ntfy 앱 불필요) ----
const CH='refuel_reset';
function nativeLN(){const C=window.Capacitor;return (C&&C.isNativePlatform&&C.isNativePlatform()&&C.Plugins&&C.Plugins.LocalNotifications)?C.Plugins.LocalNotifications:null;}
async function ensureChannel(){
 const LN=nativeLN();if(!LN)return;
 const sound=localStorage.rf_sound!=='0', vibe=localStorage.rf_vibe!=='0';
 try{await LN.deleteChannel({id:CH})}catch(_){}
 try{await LN.createChannel({id:CH,name:'재충전 알림',description:'토큰 한도 초기화',importance:sound?5:2,vibration:vibe,visibility:1,lights:true,lightColor:'#46e08a'});}
 catch(e){rlog('warn','채널 생성 실패: '+e)}
}
async function ensurePerm(){
 const LN=nativeLN();if(!LN)return false;
 try{let p=await LN.checkPermissions();if(p.display!=='granted'){p=await LN.requestPermissions();}return p.display==='granted';}
 catch(e){rlog('warn','알림 권한 확인 실패: '+e);return false;}
}
let lastSchedSig='';
async function scheduleLocalNotifs(agents,force){
 const LN=nativeLN();if(!LN)return;
 const enabled=localStorage.rf_notif!=='0', now=Date.now();
 const items=(agents||[]).filter(a=>a.block&&num(a.block.reset)*1000>now+5000)
   .map(a=>({name:(a.name||''),at:num(a.block.reset)*1000}));
 const sig=(enabled?'1':'0')+'|'+(localStorage.rf_sound||'1')+(localStorage.rf_vibe||'1')+'|'+items.map(i=>i.name+i.at).join(',');
 if(!force&&sig===lastSchedSig)return; lastSchedSig=sig;
 try{const pend=await LN.getPending();if(pend.notifications&&pend.notifications.length)await LN.cancel({notifications:pend.notifications.map(n=>({id:n.id}))});}catch(_){}
 if(!enabled){rlog('info','알림 꺼짐 - 예약 안 함');return;}
 if(!items.length)return;
 if(!await ensurePerm()){rlog('warn','알림 권한 없음 - 예약 취소');return;}
 await ensureChannel();
 let id=100;
 const notifs=items.map(i=>({id:id++,title:i.name+' 재충전 완료',body:'5시간 사용량 한도가 초기화되었습니다.',channelId:CH,schedule:{at:new Date(i.at)}}));
 try{await LN.schedule({notifications:notifs});rlog('info','로컬 알림 '+notifs.length+'건 예약');}
 catch(e){rlog('error','로컬 알림 예약 실패: '+(e&&e.message||e));}
}
async function testNotif(btn){
 const LN=nativeLN();
 if(LN){
  try{if(!await ensurePerm()){alert('알림 권한이 필요합니다.');return;}
   await ensureChannel();
   await LN.schedule({notifications:[{id:9,title:'Refuel 테스트',body:'알림이 잘 보이면 성공입니다.',channelId:CH,schedule:{at:new Date(Date.now()+1200)}}]});
   rlog('info','테스트 알림 예약');if(btn)btn.textContent='전송됨';}
  catch(e){rlog('error','테스트 알림 실패: '+(e&&e.message||e));alert('실패: '+(e&&e.message||e));}
 }else if('Notification'in window){
  try{if(Notification.permission!=='granted')await Notification.requestPermission();new Notification('Refuel 테스트',{body:'알림이 잘 보이면 성공입니다.'});if(btn)btn.textContent='전송됨';}
  catch(e){alert('알림 실패: '+e);}
 }else alert('이 환경은 알림을 지원하지 않습니다.');
}

// ---- 설정 패널 (우상단 ⚙) ----
function toggleRow(label,key){
 const on=(localStorage[key]||'1')!=='0';
 return `<label style="display:flex;justify-content:space-between;align-items:center;padding:12px 2px;border-top:1px solid var(--bd)">
   <span>${label}</span><input type="checkbox" data-k="${key}" ${on?'checked':''} style="width:22px;height:22px"></label>`;
}
function openSettings(){
 if($('#setpanel'))return;
 const ov=document.createElement('div');ov.id='setpanel';
 ov.style.cssText='position:fixed;inset:0;background:var(--bg);z-index:9998;overflow:auto;padding:max(16px,env(safe-area-inset-top)) 16px 40px';
 ov.innerHTML=`<div class="top"><div class="brand">설정</div><button id="setclose" style="background:none;border:0;color:var(--tx);font-size:22px">✕</button></div>
  <div class="setup"><b>연결</b><br>상태: ${PAIRED?'<span style="color:var(--acc)">연결됨</span>':'<span style="color:var(--warn)">미연결</span>'}
   <button id="s_scan" style="width:100%;margin-top:8px">📷 다시 스캔 (연결/변경)</button>

function tickCount(){
 const now=Date.now()/1000;
 document.querySelectorAll('.count').forEach(el=>{
  const r=parseFloat(el.dataset.reset);
  if(r&&r>now)el.textContent=dur(r-now);
 });
}
async function poll(){
 if(!T||!K)return render();
 try{
  const res=await fetch(`${SV}/${encodeURIComponent(T)}-s/json?poll=1&since=all`,{cache:'no-store'});
  const lines=(await res.text()).trim().split('\n').filter(Boolean);
  let bad=0;
  for(let i=lines.length-1;i>=0;i--){
   try{
    const m=JSON.parse(lines[i]);
    if(m.event==='message'){state=await decrypt(m.message);lastFetch=Date.now();break}
   }catch(e){bad++/* 복호화 실패(위조/구버전) → 무시 */}
  }
  if(bad&&!pollState.badLogged){rlog('warn','복호화 실패 메시지 '+bad+'건 무시(키 불일치 또는 구버전). 재페어링 필요할 수 있음');pollState.badLogged=true}
  if(state&&!pollState.ok){rlog('info','PC 상태 수신 성공(에이전트 '+(state.agents||[]).length+'개)');pollState.ok=true}
  render();
  if(state)scheduleLocalNotifs(state.agents);
  const age=state?Math.round((Date.now()/1000)-num(state.ts)):null;
  $('#meta').innerHTML=state?(age>1200?`<span class="stale">PC ${Math.round(age/60)}분 전 응답</span>`:`동기화 ${new Date(lastFetch).toLocaleTimeString('ko-KR')} 🔒`):'대기 중';
 }catch(e){$('#meta').textContent='연결 실패(오프라인?)';
  if(pollState.ok!==false){rlog('error','릴레이 연결 실패: '+(e&&e.message||e));pollState.ok=false}}
}
rlog('info','앱 시작 · '+(DEMO?'데모':PAIRED?'연동':'미연결'));
{const g=$('#gear');if(g)g.onclick=openSettings;}
if(DEMO){state=demoState();render();$('#meta').textContent='데모';setInterval(tickCount,1000);}
else{render();poll();setInterval(poll,30000);setInterval(tickCount,1000);}

// AdMob 배너 — 네이티브 앱(Capacitor)일 때만. 웹에선 아무 것도 안 함(가드).
document.addEventListener('DOMContentLoaded',async()=>{
 const Cap=window.Capacitor;
 if(!Cap||!Cap.isNativePlatform||!Cap.isNativePlatform()){rlog('info','웹 실행 - 광고 없음');return}
 const AdMob=Cap.Plugins&&Cap.Plugins.AdMob;
 if(!AdMob){rlog('error','AdMob 플러그인 없음(네이티브 등록 실패)');return}
 // ↓↓↓ 출시 전 실제 AdMob ID로 교체 (지금은 Google 공식 테스트 ID) ↓↓↓
 const TEST_BANNER='ca-app-pub-3940256099942544/6300978111';
 const IS_TESTING=true;   // 실제 출시 시 false
 try{
  await AdMob.initialize({initializeForTesting:IS_TESTING});
  rlog('info','AdMob 초기화 완료'+(IS_TESTING?'(테스트 광고)':'(실제 광고)'));
  await AdMob.showBanner({adId:TEST_BANNER,adSize:'BANNER',position:'BOTTOM_CENTER',margin:0,isTesting:IS_TESTING});
  document.body.style.paddingBottom='60px';   // 배너에 콘텐츠 가림 방지
  rlog('info','AdMob 배너 표시 요청 성공');
 }catch(e){rlog('error','AdMob 실패: '+(e&&e.message||e));}
});
